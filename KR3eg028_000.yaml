front:
  text: 序伏邪為病前人有特筆暢明言之凡近世醫生所謂調理本症是也以其病持久而徐變動不速奏效不易故也其實內有伏邪為病者十居六七其自生之病不兼內伏六淫者十僅三四前人未嘗分別著書立說以故伏本臟生病皆所混雜不分而總以調理本症目之以金匱與和劑局方等之古法治之僅按其外面自現症候名目用方按圖索驥有效有有效總未得究其病根之法分別用方在本臟自生之病或有對症之理在伏邪為病之症不知祛邪外出之法故鮮能收功予經歷多年覺本臟自生病不兼伏邪者用古法治可以奏效若兼伏邪即難應手一遇全因伏邪為病而累及本臟自病者更無全愈之日矣欲人徒以試藥藥目之以為病不可治而予創立伏邪說治法分別六淫治之一面扶正一而祛邪不操切圖功務使內伏之邪氣外解臟腑之真元復舊而後已念年以來獲效甚夥於心甚安不敢自秘為獨得之奇願以公諸後世非予也獨創為異說也以內經有春傷於風夏為飧泄等論吳氏葉氏已先開伏暑法門予因隅反覺六氣皆有內伏為病者故條分縷晰六氣伏邪分別診治法以告後學蓋邪機隱伏病根深藏非若新感易於辨識易於祛除也著者識
