body:
  text: 伏邪新書伏邪病名解感六淫而即發病者累者謂之傷重者謂之中感六淫而不即病過後方發者總謂之曰伏邪已發者而治不得法病情隱伏亦謂之曰伏邪有初感治不得法正氣內傷邪氣內陷暫時人假愈後仍復作者亦謂之曰伏邪有已發治愈而未能除盡病根遺邪內伏後又復發亦謂之曰伏邪有伏燥有伏寒有伏風有伏濕有伏熱伏燥其面色如常但中正印堂年壽兩顴等處間有白氣隱於皮膚之裡白而不澤舌苔白腐白如銀灰色亦有黃白相間者如表心紙色而厚甚則僅如錢大一塊在舌中心而四面如駁去者或四面有白腐而中心如挖去者脈象沉取短澀浮取反覺小滑兼生氣者脈兼緊左右彈兼勝復氣者脈兼大數胃脘不舒中氣故覺痞悶也此伏燥常見之形症也燥金邪氣伏於陽明發為嘔吐翻胃當胸脘痛腸結內有燥屎如羊矢豆內結而大便反溏泄或細如金果條或滯下滯下大便不爽痛而不通之候噎膈俗傳膈食病皆由燥屎而成紫虛四言脈訣有翻胃嘔吐結腸者亡之論予以燥結下之無不生者無汗或但頭汗出無汗燥傷津液也但頭汗出者頭屬陽明部也加減調胃承氣湯主之去芒硝加蘇子歸身淡蓯蓉火麻仁潤以下之法也燥金邪氣伏於陽明日久不解傳入衝任發為當臍而痛時作時止時緊時鬆疝瘕癥結脫營血枯久則成乾血癆症乾血癆本世俗之俗名然惟此一症名實相治如上法加桃仁蘇木烏賊骨杏仁蘇子蘇梗以通之此寓補於通之法桃仁蘇木烏賊骨溫通活血而不傷氣杏仁蘇子蘇梗少用之以為助以調氣降氣生甘草稍亦能通下日久虛甚者參用通補丸奇經丸脈結而牢緊者天台烏藥散加巴霜法亦可參用燥金邪氣伏於兩厥陰血分肝與胞絡皆主血兼及衝任男子虛疝血虛之人日漸瘦弱嗆咳寒熱似癆少腹拘急似痛非痛脅下疞痛如帶束腰際狀者帶脈亦病大肉削脫津液消亡也脈芤虛短澀者當歸羊肉湯主之用歸身一錢連皮羊肉三斤白煨另煎加入食羹獨用亦可補血潤燥之法也女子月事正盛及男子血不虛者燥氣縛血結成瘧母痞塊癥瘕腹脹痛者化症回生丹主之虛者人虛症實通補奇經丸參用人虛症實故用通補兼施法燥金邪氣伏於手太陰肺絡發為肺痿皮毛枯津液槁嗆咳咯血天府穴痛胸痛如夾未化熱者紫蘇子湯主之方用杏仁玉竹柏子仁生甘草蘇子火麻仁阿膠化熱者脈數大兼芤潤燥救肺湯主之即喻氏清燥救肺湯去桑白皮加蔞仁燥金邪氣伏於陽明傳入足太陰脾絡少腹兩旁夾臍而痛甚不能直身如伸直則脾之大絡拘急而痛更甚大便細若金果條亦有羊屎矢豆糞在內者五仁丸主之脾約麻仁丸亦可參用此條當與前陽明法參用燥金勝氣陽虛不旺者感之頗似寒症以其脈緊澀而小舌白無汗形類傷寒用散寒藥則化熱脈變小數口渴睛紅等用證用清涼藥則又似寒脈又變小緊而澀緩細結等陰象口中生水此甘寒藥之弊也用苦寒藥如芩蓮知柏之屬蔞貝山梔等類則益燥而血液干元氣減用溫補如黃耆潞黨蒼朮則中宮壅寒不通用消導化痰藥如陳皮半夏厚朴山查神麯雞內金等則劫傷胃陰胃汁津液反壅塞於胃之上脘不降口生涎沫燥極反澤矣燥結愈堅胃汁燥干腸中無津液滑潤則燥屎愈加堅結難下矣兼勝氣為次寒為清邪當溫攻潤下之者誤用寒下法必變生厥冷肢逆汗出如水陽氣旺者易化為火即燥金復氣也脈數有力舌黃化熱即從火熱治之故燥氣化火之症易治人人能識人人能治但在化而不化脈象方數舌色初黃之候誤用苦寒則難治矣按燥金之症與七情抑鬱悲憂思症相似以其同為秋氣傷人治法皆以春和生髮之氣解之脈同一澀脈而有長短浮沉之異燥傷血故脈沉而短憂鬱生於七情不適善傷氣故脈浮澀而長細金性沉著緊斂易生燥屎憂鬱則無之故憂鬱用蘇梗制香附溫和行氣舒暢氣機伏燥用蘇子杏二歸身有油有汁之品溫潤血液而一由六淫燥氣內伏一由七情抑鬱而生學者當攻其同中之異分別用藥以施治焉又按燥極反澤口生涎沫與熱邪入營口反不渴津唾多胃熱則廉泉開症相似熱症舌質多紅紫苔薄白如雪青杭綢色燥症舌色不甚紅紫少有分別而熱症可清燥症不可清也至於熱症未傳陰液色大傷脈反小澀淡症陰傷脈亦小澀熱症小澀然靜中有動多芤澀相兼者燥症以澀為本脈其人形症未久未大傷陰津即有澀脈一為末傳脈敗象一為初中傳本脈病之久暫深淺其候不同亦易變也學者亦當細心分別焉蓋燥即干也一則是西風吹乾一則是火氣炕干其耗傷津液則同一乾燥而治法則大有不同一宜清潤甘寒而潤火燥治法也一則宜溫和甘平而潤燥金治法也伏寒其人面色淡黑而黃如浮煙籠罩黃黑皮里有青白氣隱隱現於年壽山根額上兩顴臥蠶等處爪甲色淡不甚紅微兼青白舌苔薄白如敷米飲如染豆漿而潤舌棉淡不甚紅脈沉遲弦細而弱痛者兼緊痛甚則如新張弓弦或兼結食不甚消有食入半日而吐出仍未腐化者行動言語皆遲緩神氣消索小便清長此伏寒常見之形證也寒邪伏於足陽明經傷胃之陽氣胃汁冷發為胃寒飲食不消胸悶脘脹胃汁冷陽氣困故消化不速而有是症吐水津液不消陽氣不足脾不消水液也甚則腰以下如坐冷水中胃陽不足腎陽亦憊也喜熱惡寒此寒從胸受或從足背受者故無傷寒表症治以甘溫溫中散寒湯主之乾薑砂仁附片甘草寇仁苓朮加灸足三里胃腧中脘畏灸者以蒜泥代灸法或散陰膏貼中脘穴寒邪伏於手陽明手太陽經發為腸癖白痢五更冷瀉瀉色白臭腥淡少腹痛有定處綿綿不巳非得熱熨不能解也白芷乾薑湯主之白芷桂枝破故紙乾薑蓯蓉甘草萊菔子灸二腸俞散陰膏貼臍貼大小腸俞穴寒邪伏於足三陰經肝脾三陰經由足心臍腹而受發為少腹痛為奔豚氣氣上衝痛兼衝任脈病為伏梁任脈病也為寒疝厥少陰衝任病為足筋拘攣陰蹻病也膝冷脛酸腎病也感寒即發者溫暖三陰湯主之吳萸木香乾姜肉桂附片甘草疝者加荔枝核橘核元胡索足筋拘攣者加五加皮虎骨膠木瓜灸三陰交湧泉穴散陰膏貼之亦可畏灸者以炒鹽填臍中上加薑片灸之不傷皮肉火氣緩緩入腹灸一火急按之使火入腹為補火法寒邪伏於手太陰肺輕咳喘甚則哮咳吐寒飲白沫白沫如水不黏不能引絲有絲亦易斷感寒即發輕者蘇杏二陳湯主之重者麻黃湯兼足中陰症仲聖小青龍湯麻黃附子細辛湯苓桂朮甘湯選用兩太陽脈虛緩而遲弦按之滑者兼濕痰水飲症也故用苓桂朮甘湯實土以制水也灸肺俞穴或散陰膏貼天府肺俞穴亦可寒邪伏於衝任二脈女子天癸後期短縮而少少腹胯紋際痠痛子宮虛寒血凝經閉則為癥結血蠱女子天癸適至衝任二脈虛或食冷或下部受寒每多致此仲聖桃仁承氣湯主之生化湯亦可主之子宮虛寒者寧坤丸癥結者化症回生丹寒本水氣靜順之化其氣凝冽故有冰凝之患人之血液也得寒則冰凝水液反少不比濕邪水液反多也其感寒而水飲停蓄為吐水喘哮痰飲之症者非其人陰液有餘即犯滋潤之弊故經文曰寒淫於內治以甘熱佐以甘辛良以陰液少者感寒則易化為燥也甘屬土以土剋水用甘者亦勝制之義也甘辛發散屬陽以舒陽氣而化為汗也陽氣旺者易化熱用甘以潤保護津液使陽氣舒和運津液而為汗使寒從汗解由皮毛而出無化熱之弊也內經冬傷於寒春必病溫此寒猶伏在皮毛腠理其人陽氣旺陽郁久而化為溫熱也世醫讀王氏經緯故只知寒化熱為伏邪而不知有六淫本氣伏於內從內而發之伏邪矣此篇故不得不作也化燥者參用燥金治法化熱者參用伏熱治法有其人陽氣不足陰液有餘則自始至終為寒氣不化燥熱而水液不消與濕氣合而為寒痰水飲之症者參用濕邪治法脈沉遲而滑者陰液有餘可用溫澡沉遲而澀者陰液不足不可燥則以甘辛溫法治之按伏寒脈症頗與七情憂鬱思慮相似蓋思則脈多沉遲甚則結者憂鬱氣滯脈亦遲澀但伏寒脈左寸人迎必應七情脈左寸人迎不應若兩閉右寸氣口脈見沉遲細結之象而無上第三四條足三陰症與手太陰症者從七情思慮治之但用溫和舒散其陽氣而已不可用以上之法也人迎主外感六淫伏邪雖無表症亦外感入內者也內傷以氣口診之見東垣內傷外感辨伏風其人面色如常但鼻上山根年壽微現青氣隱隱臥蠶顴際亦微青白爪甲青白白睛帶青舌苔浮而易去無定色間有菜色青黃相間舌質如發青紡綢之兼青者色暗不鮮其脈弦緩往來滑利如波浪之湧按之則芤浮取則虛神志蕩蕩然胸中嘈飢善餓或有微惡風之狀青木色也浮而易去無定色風善行而數變也舌質兼青暗風伏於內血色變也弦肝木本象也緩一息四至風之正象也滑利如波浪者血被風鼓盪而行也滑利似津液有餘而按之芤者風耗血液也浮取則虛同不在表而入里之候衛陽返虛也此伏風常見之形證也風伏足陽明太陰脾胃土受木克風氣疏土運化較速時欲嘈飢食已欲瀉此即內經春傷於風夏為飧泄症也風伏入夏土旺不受邪故能捍邪而病發也胃能化食全賴膽汁入胃以化之風甲木膽氣也故運化速於平時脾陰土也主統運水液風陽邪陽主動故運消水液亦較速也飧食也以嘈飢而時時欲食也食已即欲瀉者運化太速水分不及分別清濁故干稀皆從大腸而出也此似土虛之症不知土旺之候伏風發作而為病法宜培土抑木祛其伏風桂枝湯主之桂枝木生甘草杭白芍木香桂枝去皮用木使入里也甘草培土白芍能於土中瀉木微加木香者以配白芍也日久欲化熱者去木香加木瓜少許久不愈者橄欖茶飲之橄欖與木瓜皆木中之金也善制風木此勝製法也橄欖四五枚打破泡汁緩緩飲之如無鮮者蜜餞甜橄欖亦可用之風入了明之裡者腹痛喜按白礬紅糖丸此亦勝之下法也以明礬末用紅糖蒸化和為丸如桐子大每服七丸或十四丸使風氣從大解解之法也飧泄不已小兒則成疳疾牛肉全蠍粉方載吳鞠通解兒難中大人則成消食風消骨瘦混元一氣丹吞之即生雞蛋一枚溫水浸溫吞之甘草芍藥湯少加雞金全蠍風伏脾絡大人夾臍而痛有鬆緊有止息戊己丸全蠍湯下小兒臍風撮口未發之先面色如土既發則額上黃黃至口角不治治法詳幼科鐵鏡中夏氏燈火十三醮法口不能張唇若荷包撮不能乳哭木香疏風飲主之木香全蠍桂枝蟬退木瓜芍藥甘草風伏肺絡鼓湯痰飲發為喘咳吐白沫兼寒者麻黃湯不兼寒者白芥子湯獨用兼化熱者麻杏石甘湯耗傷津液發為嗆咳桑菊蔞杏湯桑葉菊花蔞仁杏仁兼化熱者加冰糖川貝母潤之痰涎實者釀為肺癰咳吐臭痰濃濁異常之多獨用白芥子或用芥子或用芥子末拌青黃牙白菜醮麻油當菜食之數日則風痰可從大便下古有陳芥菜滷治肺癰法予因思陳滷難得且咸能傷血棗人喉嚨臭而難食改用此菜食改用此菜食之治效甚夥化熱者雪羹湯大荸薺淡海蜇頭熱甚加甘草酒炒大黃微降之按伏風喘咳之症誤用辛溫其變症頗有失血吐紅似勞者喘咳之症誤用滋補亦多纏綿飲食不進似癆者誤滋補者三子養親湯誤辛溫者桑菊蔞杏湯水貝風伏肝絡發閒厥瘛瘲眩暈抽搐目睛斜視此即俗謂羊癲風等類也經謂之癇方書謂有五癇有夜發晝發陰蹻陽蹻脈病也肝液不甚虛者有風痰飲流入經絡隧道故發或愈明礬鬱金橄欖汁為丸緩緩治之血虛者左癰右瘓足不能舉痿痹遠原酒主之方載後風伏陽明肉腠理為癢為腫癢甚腫甚自頭面起一二日偏身皆腫桑菊飲加鉤藤蟬退主之不治及治未盡者變生癬癩輕者為癬重者為癩遠原酒主之風入膝肯犢鼻穴發為鶴膝風膝腫大腿細屈伸不利還原酒主之風入環跳穴發為附骨痛風不治則成附骨疽三退二香散主之露蜂房人發制沒藥蛇退制乳香共研細末酒調如干面式服一團陳酒下取汗遠原酒主之風入衛陽頭生白屑麵皮乾燥漸及偏身發為白癬陰液不足好色之人發為腎臟風俗名陰癬生於兩胯陰間漸及兩股遠原酒加減主之在上生白屑者去油松節加干浮萍葛花在下部者去油松節加黑大豆阿膠黑芝麻龜板膠血熱者為紫癜風加酒炒大黃血氣虛者為白癜風即白癍駁雜加潞黨參黃耆防風白癍多有兼濕者宜加油松節用之風入陽明頰車穴痠痛口不能張為骨糟風辛桂芷黃湯主之細辛白芷片黑大豆肉桂炒大黃芥穗風入陽明肌肉厥少陰筋骨肌肉麻木筋骨痠痛痹化熱則為白虎痛風風痹者遠原酒主之痛風者白虎湯加鉤藤風入筋骨歷疼痛癢腫走竄不定甚則頹筋壞骨鼻塌毛髮脫手足拘攣日久則皮破流水潰爛浸淫骨節脫離而死者俗名曰大麻風癘疾又曰癘風此風症廣東名曰麻風各省皆由彼處傳來亦如楊梅瘡毒名曰廣瘡亦由廣傅來二症末候末假形證大抵相似蓋同一氣候之症源同而流異也楊梅毒不服輕粉不入筋骨麻風入內之精氣不虎不入筋骨蓋同一厲氣也未頹筋壞骨鼻腫者還原酒主之已頹筋壞骨者五虎七液丹主之方用全蠍斑獵蜂房蜈蚣蛇退各一兩皆焙存性研末明雄精月石各五錢研細末酒炒大黃末四兩諸末合為一處磁盤盛之加側柏葉鮮荷葉大青葉佩蘭葉紫背浮萍野菊葉五葉藤各取自然汁一兩青果連核磨汁一兩右菖蒲磨汁七錢傾入前未藥內干則研細再傾以汁盡為度陰乾再研豬汕拌為丸如梧桐子大每日服三十丸生甘草湯下服至泄瀉止停數日消息胃氣再服弱者減之壯者增之痿痹還原酒方土炒鉤藤一兩白歸身五錢炒小胡麻一兩五錢入乳拌油松節五錢酒炒桑椹子二兩夜交藤一兩五錢蜜炙絡石藤錢九節石菖蒲五錢川牛膝八錢五加皮鹽水炒五錢十大功勞子七錢伸筋草七錢薄橘紅五錢鹽水炒沙苑子一兩五錢千年健八錢大秦艽一兩二錢尋骨風六錢藕節須一兩豬髓定型條杭白芍八錢蠶繭四十九枚白花酒六斤酒浸一宿隔水煮一炷香存性五七日每日隨量飲之治腎臟風陰癬者去油松加熟地二兩伏濕其人面色黃白惟天庭兩太陽微暗鼻有油垢皮膚潤澤舌質淡邊如鋸齒苔無正色黃白灰雜相混其脈緩弱沉取則滑利喜食香脆惡飲兼熱脈則緩木化熱則脈數兼寒脈則弦遲沉寒則遲細如屋漏體重神困此伏濕常見之象也濕邪伏於兩太陰者寒熱往來如瘧又似虛癆午後熱甚綿綿不已或微咳或不咳口淡舌白滑苔薄胸悶飲入輒脹食不消腹脹或自利溏瀉小便不爽脈右關寸緩藿香正氣丸主之六君子丸亦主之三仁湯亦可選用濕邪伏於足太陰厥者脾不統血則血化為女子不月男子少腹脹大小便不爽利沉沉澤澤毫無所苦呵欠倦怠嗜臥四肢重久則浮腫香連丸左金丸戊己丸選用脈見兩關緩淡邪伏於兩陽明足太陰者胃陽困泄痢後重腹痛時作時止面浮見右關寸緩痢痛甚者脈兼結小兒發為疳疾頭毛槁腹大化熱則嘈飢時時欲食食亦不多不消食已而泄神術丸異功散香砂枳朮丸濕邪兼熱伏於二少陽二太陽經者寒熱小便赤自汗目胞浮脈緩大兼數見於左關寸舌苔黃膩黃芩滑石湯濕邪兼熱伏於二厥陰經者善怒脅下痛有止息女子經前腹痛月事不爽色淡男子疝瘕脈左關寸右尺緩大兼數舌苔黃灰而膩金鈴子元胡索散濕邪兼熱伏於手太陰足陽明者發為陽黃舌黃灰而膩脈右關寸緩大而數苡仁滑石湯濕邪伏於兩太陰兩厥陰足少陰者兩脈弦緩痰飲停蓄喘咳嗽稀痰面微浮甚則如哮嘔吐狀如胃寒小青龍湯外臺茯苓飲見水心怯欲作寒戰者膏盲受濕需灸膏盲俞二穴砒豉丸少少與之不知再加二粒濕邪伏於足少陰腎經者小便濁腰脹以下如坐水中面色黃而暗如油垢狀脈兩尺緩大如按綿包雞絲魚翅湯魚翅如平常調和亦可加雞絲兼寒濕者發為陰黃茵陳朮附湯金毛狗脊五加皮湯兼熱者發為陽黃黃汗滑精茵陳大湯麻杏石甘湯加細辛滑精者二妙丸黃芩白朮散陽氣虛陰液足者易化為寒濕陰液虛陽氣旺者易化為濕熱陰陽平等者濕邪本氣始終不變有因藥而變者不可不知如久利則陰傷陽餒如久燥則陰傷陽亢之類潤之則病深不解補之則驚悶煩躁下之則潤泄不止雞絲魚翅湯母雞沙魚翅治法如酒度烹煮法不拘多少量力酌用大約每日極少一小碗多則二小碗連湯連翅飲食之貧者以鳥魚羹代之即黑魚有七星者白湯煮食不可加酒鹽金毛狗脊五加皮湯金毛狗一兩五加皮五錢附片一錢苡米五錢木通一錢酒炒鹿角霜一錢何首烏三錢炒伏暑暑屬少陽相火同氣相求多少陽三焦手厥陰心胞絡症相火亦寄於肝膽亦有足少陽足厥陰症兼濕氣者多太陰脾肺之症暑字從日夏日炎烈天上太陽火氣也在六氣則為少陽相火其邪氣傷入皆由人頭背口鼻皮毛而入夏日受暑而不即病者以從人之汗孔化汗而出也若汗孔閉津液虛陰氣不足送邪出表則病作矣有送而未盡出表日復一日積累暑邪內伏至秋方病作或至秋末冬時而作者皆為伏暑秋初即發者輕易治冬月方發者重難治不兼濕邪與穢濁之氣者治法可與伏熱同參其症惡寒身熱氣虛入暮熱甚口或渴或不渴不渴者巳人血分矣面色額上黑暗紫氣隱於皮膚之內頭眩體酸目汗有汗亦不退熱其脈兩關寸虛大而芤兩尺長大洪數尺膚熱甚舌苔白沙舌質紅紫甚有薄白苔如雪青杭綢色反覺滑潤者此伏暑常見之形症也治宜荷梅湯六一散脈散白虎湯四法選用惡寒甚者用白虎湯加薄荷脈芤虛甚者生脈散加六一散入暮熱甚似瘧非瘧舌紅潤口不渴天明得汗始退熱是暑邪已深入伏於少陽厥陰血分也青蒿鱉甲煎主之暑邪伏於太陰經者日哺咳甚肌熱右寸芤虛喉中幹甚則氣喘生脈散主之欲作肺痿者暑熱伏肺陰津液干則痿天府穴痛天府穴肺之募也在乳上三脅間咳引胸腹痛陰氣傷也毛槁發焦則痿巳成矣肺之華在皮毛毛槁發亦乾槁矣至此候則危大劑生脈散加濂珠粉主之貧者以雞子清代珠溫水浸熱生吞之連黃亦可食暑伏於手足太陽手足少陽經者口苦而渴小便不利頭眩心煩手足心熱甚尺膚熱甚者六一散主之暑伏於足厥陰肝經者或渴或不渴嘔酸水脅痛脈左關弦數椒梅湯主之暑伏於手厥陰胞絡血海夢多怪異少腹脹痛時作時止嘔胸悶不思食煩躁女子有事不調男子疝瘕結甚或譫語吳氏加減桃仁承氣湯主之暑伏於兩太陰者舌白口渴腹脹氣怯寒熱似瘧有汗不解小便已灑然毛聳右寸虛大右關弦緩左關細澀此兼足大慶陰濕氣為病也東垣清暑益氣湯主之暑兼濕氣伏於兩太陰者舌苔簿白而滑脈緩身重藿香正氣散主之熱甚者加滑石湯送下暑兼濕氣伏於足陽明太陰者舌白脈弦緩而大無汗或頭汗出香薷飲主之暑兼濕氣伏於足厥陰陽明者吞酸心悸脅痛消暑丸主之化熱脈數大者椒梅薄荷湯脈緩弦細而滑不鼓指者雖渴甚左金丸香連丸選用暑兼濕氣伏於足厥陰太陰大絡者脅痛吞酸日久變生停飲脅下漉漉有聲脈弦舌滑香附旋覆花湯暑兼濕氣伏於兩陽明及手太陽小腸者脈右關寸左寸皆緩滑而大滯下紅白後重裡急腹中時痛木香檳榔丸主之化熱脈數大有力鼓指者調胃承氣湯加薄荷主之脈振指有力按之芤者可參用熱症治法增液承氣湯主之暑邪伏久深入中厥少二陰與足陽明經者失治謂不得治法日久陰液傷耗大肉削脫皮毛枯槁脈弦澀而緊勁或細若鰕遊發為戰粟抽搐角弓反張或形似虛癆而有外症病移者危有外症病移者尚可救活以其正氣尚能捍邪外出也潰久則難矣勉救之用大定珠法加珍珠合增液承氣伏熱相火為暑君火為熱熱即二火之總名也凡暑熱不兼濕症者皆可以熱名之皆可以熱症法治之其症惡寒頭眩身熱形類傷寒但身里之熱甚於表胸腹手足心腋下胯內較背項諸陽部更熱不似傷寒表熱甚也日晡熱甚日輕夜重入暮熱甚不若傷寒日夜綿綿熱無退時無輕重之別也有汗亦不退熱或汗出退至時復熱不若傷寒表熱可以一汗而解也此是分別處口或渴或不渴渴者輕易治不渴者難治不渴者熱邪深邪深入血分用清潤藥服之使達至氣分則渴能渴而甘飲則熱邪已淺一層矣唇燥口雖不渴其唇必燥以口中津液被火灼以舌舐唇上津液易乾燥如豆腐皮米湯鍋焦狀面雖黃暗睛明二穴鼻孔及法令額上必有紫赤之色隱於皮膚之裡冒看黃黑浮於外如煙煤籠罩如久禁風塵日曬細看或背光看則紫紅隱於內矣周身骨骱酸骨骱酸者熱灼也肝腎熱之明症也腰痛腎水為熱所灼也胸悶肺管中津液與胃脘中胃汁為熱所灼津汁少則肺胃之氣不滑利故悶自汗津液熱逼走於皮毛之外也雖有汗手足心必無足心更難得汗頭眩如酒醉狀其脈沉數兩尺長大浮取細軟沉取則數而有力或靜中有動或促舌色白沙如米粉鋪紅紙上或如雪青杭綢色舌質鋒紫深入血分則反滑潤此乃手足少陽厥陰足少陰伏熱黨見之形症也凡六淫伏邪首列常見之形症其下雖不言及皆當與常見之形症參合而斷病伏熱之症尤當加意問其初病形症與首列者合否以下諸條不詳述者省筆黑耳治宜青蒿鱉甲湯或青蒿二甲湯不言手太陰症以肺經伏熱伏尚未深其症與初感無甚大異且鞠通天士有太陰伏暑在前人易知識不必再述伏久入陽明即以上之症日久不愈或誤服二陳三仁等辛溫宣中之藥或未服藥熱邪循經傷耗胃汁傳入胃中而生熱強但頭汗出或身半以下無汗或嘔或不甚嘔便秘身半以上自汗便溏瀉醬色誤藥甚者多服曲殼枳樸砂仁辛溫化痰之品則津液上逼壅於胃脘上口則口生涎沫狀若水飲辰已時熱甚煩悶其脈或芤或洪芤者胃汁已傷所存者少洪者較輕有洪芤並見者或細數按之澀而有力陰液陰氣皆傷於熱也澀見於沉部精血亦耗也有力鼓指邪熱之力也舌質紫苔或黃黃宣者正象易治有紅孔膩滑者難治必有他故或燥燥者正氣黃燥易治黑燥治防其由潤而變燥變為神糊脫津熱症未傳之候則危或潤潤者熱入血分熱逼津液上泛也或白腐而厚熱症有白苔厚腐之苔無寒症苔乃胃中濁氣熱逼濁氣上蒸故厚如腐渣堆鋪狀濕痰寒痰油膩之症苔雖厚而膩貼舌上不服苦溫宣化藥宣透終不腐或中心裂有直裂一條者是氣分不足也有橫裂三二條者有直橫俱有裂紋者皆陰津傷也有裂如水片紋者腎水血皆傷耗也直塊如挖去者胃中陰汁大虧也有無苔赤舌而中心如挖去一片皮者胃汁大虧損及胃裡膜也有舌尖如挖去一片皮者有舌邊破裂者輕胸悶或拒按拒按者按之痛正象也人易知為陽明胃中結熱其病輕以其正氣尚能捍邪尚自知邪實也或不拒按不拒按者重必其人下症初見之時尚知拒按延誤多日不下正陰已傷正不能捍邪邪熱安結於內賊已入踞城池城中人反覺無賊兵來克腹賊難安居又亂作矣正陰稍復正能捍邪則反知悶而拒按矣必待下盡邪結方解治宜調胃承氣湯陰液乾耗者合增液法潤之如當下不下邪結在胃之上中脘者易變譫語煩躁狂迷士實剋水耗盡腎陰水不濡木肝木生風直視搖頭督脈實強角弓反張則危昏迷靜臥或自言自語唧唧噥噥聲音不高呃逆聲如擊木是內傳手少陰厥陰心與胞絡胃陰欲脫之候則危在量夕甲日甚土被木克正五行氣受克甲為土運有餘今土實而土助旺剋水是五行化氣剋水也病更甚藥難見功戊日險正五行土剋水化氣五行戊屬火運有餘火土炎烈金水氣虛者不堪命參故多難延殘喘者每見於辰巳二時辰巳時氣血注於脾胃肺脈弱氣逆多絕於寅卯二時寅卯時血注肺與大腸且金絕於寅肺病怕寅時辰戍丑未四時土旺剋水腎陰敗者多絕於四時之內陽明伏熱腸胃中有燥屎熱結旁流自利稀水者增液承氣合調胃法主之凡系陽明熱結皆有首條與上條傳入陽明之形症熱傷胃汁腸胃中之脂膏不甚滑利故宿糞難下熱邪逼迫津液稀汁上下消亡上則嘔吐明汁清水下則熱瀉暴注清水甚有清水中如蛋白而下者其僅泄溏糞醬色金黃紅色者猶為輕症故下陽明熱結用增水行舟法使水長舟浮方能行動如初下用增液調胃法雖下出稀水稀糞或黑水或清水有腐渣腳如石屑狀者皆可下之症難下之症也不必驚懼仍守法更加重用之下至有糞色稍見小效下至宿新黃如雞爪葵花黃白相兼色軟如折帶盤若小蛇之糞其熱乃真盡之候始停下法用養正法調理如加減復脈湯芍藥甘草湯等類不比傷寒化燥下法傷寒化燥有燥屎無熱邪傷陰故傷寒未化燥屎誤用大小承氣下稀水者十有九脫不救熱症用增液調胃二承氣下無形之熱為重有形之宿糞為次不過借有形之糞水驗無形之熱邪解未解盡耳熱邪有重輕下有難易之別熱結輕者一下便得燥糞而症解者稍重者初下便得溏醬色再下得燥屎解有初下得稀黃糞再下得黑垢再下轉醬溏再下燥屎再下得新黃折帶恭始解者有初下得青黃糞再下得黑水如洗黑灰垢水三四下始能得黑垢如黍黏黑血條五六下後始轉換醬溏燥屎者有初下得清水再下得蛋白漂水中二三次下之始得清水蛋花糞少許然後漸轉黑水黑垢醬溏等樣者有初下得清水中夾黑屑如鍋焦黑屑如茶末再下得清水中有白屑腳沉底如炒黃腐渣屑或如石屑粗粉然後始轉蛋花糞等樣有初下已得燥糞症脈不減再得前樣等物者有中間已得燥屎其症不減再下得羊矢豆後始轉新黃折帶方解者有下得燥屎後症脈不減或症減脈不減或脈減症不減再加生脈法合前法下之又得黑爛水糞或得小鐵丸硬子之後始漸轉黑垢醬等樣者其症則始輕後重先不渴後反渴先不不燒熱後反大燒熱先舌不黑後反舌黑先唇不焦破後反焦破總之下症先不全現後反下症全現皆藥攻病外達之象也攻陽明伏熱推大黃為第一良將元明粉次之生甘草則宰相安民連餉駕馭將士扶助國脈之大功臣也前所述各樣之糞水皆一層重一層層次甚多險象疊現清水以下皆奇險難治之症多可怕煞人病家醫士多心驚膽戰而予敢守定潤五增水舟之法而收入難能之功者其要訣秘法惟在於脈任壽按愈下之愈覺脈象起有神力鼓指按之愈覺有力雖細弱如無脈按之至筋骨間覺細數有力之一二動下之一二劑反覺有脈者皆可救之症也經歷多年不爽故敢述之以告後學案驗列後此皆陽明熱結當下失下日久遏伏而成之症治之之法總不外乎增液調胃二承氣故細述所下之物以堅後學之心特用藥有重輕加減要貴隨症變化耳陽明伏熱傳入血分周身血脈皆熱氣旺者發紅疹氣弱者邪深發紫癍俗名蒲萄瘟症犀角大青湯合調胃承氣主之氣虛者加北沙參氣旺者發疹加薄荷油三四滴疹高起而亙手者肺氣旺也癍不高起氣虛者邪陷不能外達反有中凹者有欲爛破者皆危候也如顏色鮮紅不紫黑癍雖大無妨陽明伏熱發為牙癰牙疳喉疳口臭者胃已腐也增液承氣湯主之牙癰者輕牙疳者蝕也牙齦紫暗黃白橫延如蠶蝕葉之快喉疳者喉外不腫尚輕重者內外皆腫極危腫者外面宜用針刺出血內需大下大瀉方能挽回如不瀉及不大瀉者有腐胃爛腸爛喉舌鼻流臭涕者涕有紅白黃水而臭由陽明熱傳入腦髓也皆十難救一二之症也僅流黃水湯內加薄荷油五七滴如不嫌麻刺或不覺薄荷辛而反倍加與之陽明伏熱發為瘡瘍或發為疫痘腰痛甚者增液承氣湯合青蒿龜板煎主之發而未忍痛瘡假愈復變瘡蠱或變為浮腫以上法加薄荷油三中滴主之有疹後發腫有癍後發腫有瘡後發腫者有瘧痢後發腫者其腫與濕腫無異但皮色不黃而紅皮上撫摸之覺毛孔如刺病入覺刺痛稍重則不覺痛有衣角衣邊輕掃之而覺痛者誤作濕腫治之必壞世醫見腫多作濕腫治之不知浮腫有幾種病因故經歷雜論有浮腫辨法此陽明伏熱變生浮腫者由於熱邪竄入肌肉故也雖腫皮不甚光亮不甚黃白皮內有血色隱於內必稍兼色必有以上伏熱形症即現在不見以上伏熱形症其初病之時必已現過醫者切脈問症必問其初症情形與現在形色參合斷之自無疑惑矣有陽明伏熱之症下已通燥糞已下而忽然紅腫乃內里餘熱外達也再下之見折帶新黃糞則消陽明手太陰足少陰伏熱發為下痿皮槁或內作肺痿乾咳引痛或內作腎痿腰痛足痿足皮發宣增液承氣加龜板雪羹湯主之實者發為熱痹見於手足腿腕肩臂而痛其痛處色微紅前方加忍冬藤桑枝下部加木瓜少許以引經經曰肺葉焦令人痿肺主皮毛肺熱耗傷津液則毛髮枯槁而不生咳則牽引胸脅痛耗及腎水少腹亦覺牽引抽痛咳則筋骨震有欲咳而不敢咳之熱腰為腎府足為腎司虛則足不能立其足皮發宣者陽明主肌肉故皮肉宣厚如隔布袋搔癢甚則麻宣不仁氣體實者正能捍邪熱故僅見四肢癢痛恐人誤作風寒濕痹痛治故標明痛處皮色微紅有血熱之象或不見紅色以手按之指縫際皮色即現紅紫血印指按處白印是熱傷肌肉脈絡之血的實證據也陽明少陰督脈陰蹻伏熱發為筋急拘攣脊強反張腿並不能開膝灣曲而不直增液承氣加龜板犀牛角豬脊髓主之此條人每以風症目之而不知熱症亦是症也熱入督脈則脊強反張以督脈之陰液被熱所耗也入督脈之藥多系溫品寒品少有而予於古人無法處恩出一法用大黃以瀉陽明會督脈於頭瀉陽明即所以瀉督脈也豬脊髓鹹寒滋潤以豬為水畜能治火熱即用其督脈以補人督脈之陰液清入督脈之火也脈經曰尺左右彈者陰蹻脈為病動苦少腹拘急而痛足內攣又曰陰蹻脈為病當下之此腿並不能分開膝曲而不直足陰蹻脈內攣急之證據也其未筋攣以前必有少腹拘急之症即攣之後或反不自覺矣此症雖筋骨拘攣而不知痛下之至知筋痛再下之由小痛至於大痛復下之由大痛日漸減至於不痛而後伸開清其餘熱養其腎陰方漸復若誤作風濕痹症治之易至不救陽明伏熱當下失下日久變生外症名曰病移發其症界乎癰疽之間有初起紅者暈大白粒小紅暈易散大潰亦於平爛敷以陽癰藥則變腐黑紫暗用提膿藥則流水而不得膿更易溫延散大有初起顏色不變漫腫無頭而皮熱愈摸熱肉中脈管青紫色生於手臂腿下者輕生於背股腋胸腹者重難治有內生胃癰外發於胃癰外發於胃腧穴部有內生腸癰而外發於少腹臍腰下者有發於腎腧穴者有發於肺腧穴者皆難救治必須先治內症待內症減而後可顧外症若先閉遏外症邪出之路內必加重不救矣故外用從治法使引熱外出內用勝治法外貼散陰膏和陽膏能散能斂增液調胃承氣湯主之陽明足少陰手太陰伏熱狀似虛癆乾咳或吐白沫甚則粉紅白沫夜熱骨蒸飲食不納肌肉消素大肉削脫大骨枯槁皮黑毛槁色如面垢豬膚湯豬腎湯合調胃增液法加龜板主之富者加珍珠燕窩貧者以生雞子代之陽明與肺腎熱久陰傷津液枯槁則乾咳無痰反咳吐白沫者此沫非濕氣飲水也乃肺腎胃津液被熱邪逼迫而上也甚則紅白相間熱傷血絡肺絡傷破也粉紅色者肺本色也其病必危夜熱骨蒸陰虛內熱本象也病甚則熱邪內陷反自不覺蒸熱矣胃陰傷者先食不香難納米飯苦用藥再燥劫其陰遂致亦不能容飲水矣肉消骨立皮黑枯槁如面垢肺主皮毛毛槁皮垢干而棘手邪傷腫汁之症也胃主肌肉大肉即合谷兩臂兩腿之鼠肉也病者無鼠肉胃汁已將竭也大骨枯槁謂骨瘦如柴骨韌鋒露骨孔空陷也腎主骨主髓腎熱已久骨髓枯槁骨衣之油皆耗故大小骨空深陷畢現於外也用豬膚湯去白粉蜜單用豬膚即豬之厚皮也取其鹹寒微甘而多脂膏能除大熱能填補胃汁肺汁骨髓功力最大豬腎湯取豬為水畜位鎮亥方上應室宿得干六之精能生坎水有一六共宗之妙為水畜中之水臟以補人之腎水大有殊功本草不載其能人謂無補益之性但可用以引經而予則以卦理斷之每獨用以為大將而成功收效神妙無比調胃增液承氣合龜板治病之本也加珍珠者取珠為蚌胎受月華而孕胎成珠月者先天金水之母太陰之精取先天金水之氣以補人先天金水之氣有再造肺腎之功極富者用數錢文武火日夜煎服但煎至水泛白即服珠有光入水再煎煎至無光再換再增但宜吊煎不可沉底力薄者用二三分乳極細以藥湯送下燕窩取其滋潤肺液耳生雞子亦有重造肺腎填補胃汁之功溫水浸熱生吞之象形補形能補入稀汁尤能補肺臟中之蛋白汁不特貧者可用富人亦可兼用之收功更易矣陽明少陰伏熱戊癸合化為火發為癉瘧俗名子母瘧每日辰巳時大熱午後方退日晡復大熱天明方退者青蒿二甲煎合增液承氣湯主之辰巳時血氣注於脾胃時也日晡酉時氣血注於腎經時也世人見病有去來發於二時皆目為子母瘧而不知其時是何經主事其瘧來寒輕熱重或但熱不寒故名曰癉瘧宗內經凡病至其年月日時復發者當下之之旨故主以增液承氣得燥糞下後見新黃折帶糞辰巳時熱方解青蒿二甲煎治少陰伏熱之正劑得熱汗至足心日晡夜熱方解陽明少陰伏熱夜間熱甚逼迫津液滯滯下俗名痢疾調胃承氣湯主之日久上嘔下則完穀不化者加白芍龜板阿膠主之熱痢滯下之症多由於陽明伏熱而成熱邪逼迫腸中脂膏血垢而下腹痛時作時止痛甚則便便後痛減不入少陰夜間不熱一入少陰則夜間熱痛則少腹拘急身不能直故以調胃承氣主之若誤治傷陰燥傷胃汁則舌光無苔而嘔下則完穀不化此乃邪熱不殺穀非脾土虛無火者此良以腸胃中脂膏刷盡米穀不能兜留故也故加白芍之酸寒以和陰氣合甘草有奠安腸胃之功龜板鹹寒以勝大熱阿膠填補脂膏令能留存米穀也仍以調胃承氣加味者取寓通於補得燥糞則痢自止矣陽明伏熱與足厥陰合病發為胸悶脘痛脅痛俗名肝胃氣痛翻胃嘔吐噎膈俗名痛膈便溏者調胃承氣加白芍鳥梅花椒主之結熱在陽明胃脘故胸悶而脘間食入輒脹痛甚得大便則減痛或泄氣則減痛脅痛者厥陰肝絡之血亦受熱邪也肝木上犯胃土故嘔吐世人皆以胃寒胃氣目之以辛溫降氣治之每多反增嘔吐不能納穀勢成隔食之症不知實屬肝胃熱邪上犯所致便結者無正相好屎非便秘即便溏而細如貓屎甚或如金果條雖便亦不甚多皆腑氣通而不通之證也故主以調胃承所之緩下而加椒梅芍以和肝取甘酸以和胃而降胃之熱結也陽明伏熱與兩厥陰衝任帶三脈合病男子疝氣結核便毒腎囊陰莖兩旁腫大如癰女子天癸不調或崩或漏或帶下或經不行或妄言妄見如有鬼神依附狀或燒熱體蒸咳嗆消瘦而少腹脹俗名乾血癆症加減桃仁承氣湯主之陰液乾涸形消骨立者加增液潤之此條即內經云二陽之病發心脾有不得隱曲女子不月其傳為息賁風消者死不治之症二陽即兩陽合明陽病發也心脾有不得曲隱謂女子善郁不得遂其隱曲之私心故胸脘不舒飲食少進也其傳為息賁者即胸中當脘處賁起一塊狀如覆杯而熱也風消骨瘦也衝脈麗於陽明任脈與衝脈會合同為血海為月經之源帶脈橫繞於身當帶系之所渾如一帶陽明胃陰虛則帶脈拘急如帶束緊之狀帶脈麗足少陽膽與厥陰肝肝膽熱胃熱則白帶下甚則黃色或赤帶下胞絡為血臟生血發血之源衝任之上游也衝任不通血海瘀熱上犯心胞絡故妄言妄見血多而熱甚妄行則血崩天癸當去而不去欲行而不行行亦不暢為漏血海有瘀熱停滯庸醫再用芎歸等溫通之藥則血中稀汁明汁如水液者耗乾血輸血塊乾涸於內反更不得流行故燒熱骨蒸瘦損之症成矣俗有乾血癆之名惟此因熱瘀而成之症最合名之前相符惜世有其名而無其法予因名悟出治乾血之法必先令乾血變為稀汁方能流行故主以吳氏加減桃仁承氣湯用大黃入衝任陽明以逐熱瘀桃仁助之幹甚者加增液潤之添補血中稀汁合復其流動之流質而後可通行也其病根不過陽明伏熱耳陽明熱解則衝任諸脈絡之血熱自解矣予屢驗有功誰謂內經死症無治法耶陽明厥陰伏熱發為息賁胸中憤起一塊狀如覆杯按之皮愈熱瘧母硬塊者加減桃仁承氣湯主之此熱結熱瘀瘧熱痞之治法也瘧母結於脅下熱瘧熱邪歸結之所也陽明伏熱吐血鼻衄女子天癸逆行者加滅桃仁承氣湯主之此血逆熱行治法也陽明伏熱當下脈尚滑利痰涎津液多者不可與調胃增液二承氣當以蔞貝承氣湯下之氣實者加枳實氣虛者加北沙參
